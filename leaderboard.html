<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaderboard — Arcgate Walkathon 2026</title>
  <link rel="stylesheet" href="_shared.css">
  <style>
    .rank-num { font-weight:700; font-size:16px; color:#ccc; width:36px; }
    .rank-num.r1{color:#FFD700}.rank-num.r2{color:#C0C0C0}.rank-num.r3{color:#CD7F32}
    .result-info { font-size:13px; color:#888; margin-bottom:14px; }
  </style>
</head>
<body>
<div class="site-header">
  <img src="aw_logo.jpg" alt="Arcgate Walkathon 2026">
  <nav>
    <a href="admin.html">Dashboard</a>
    <a href="activities.html">Activities</a>
    <a href="leaderboard.html" class="active">Leaderboard</a>
    <a href="flagged.html">Flagged</a>
    <a href="participants.html">Participants</a>
    <a href="#" onclick="logout();return false;">Sign out</a>
  </nav>
</div>

<div class="page-bar">
  <h1>🏆 Leaderboard</h1>
  <a href="admin.html" class="back">← Dashboard</a>
</div>

<div class="content">
  <div class="tabs">
    <div class="tab active" onclick="switchTab('distance')">🏅 Distance</div>
    <div class="tab" onclick="switchTab('activities')">📋 Activities</div>
    <div class="tab" onclick="switchTab('elevation')">⛰️ Elevation</div>
    <div class="tab" onclick="switchTab('pace')">⚡ Pace</div>
    <div class="tab" onclick="switchTab('calories')">🔥 Calories</div>
    <div class="tab" onclick="switchTab('steps')">👟 Steps</div>
  </div>

  <div class="filter-bar">
    <div class="filter-grid">
      <div class="filter-group"><label>From date</label><input type="date" id="date-from"></div>
      <div class="filter-group"><label>To date</label><input type="date" id="date-to"></div>
      <div class="filter-group"><label>Activity type</label>
        <select id="sport-filter">
          <option value="">All types</option>
          <option value="Walk">Walk</option><option value="Run">Run</option>
          <option value="Ride">Ride</option><option value="Hike">Hike</option>
        </select>
      </div>
      <div class="filter-group"><label>Team</label>
        <select id="team-filter">
          <option value="">All teams</option>
          <option>Team Seattle</option><option>Team San Francisco</option>
          <option>Team Los Angeles</option><option>Team Chicago</option>
          <option>Team Austin</option><option>Team New York</option>
        </select>
      </div>
    </div>
    <div class="filter-actions">
      <button class="btn btn-primary" onclick="loadLeaderboard()">Apply</button>
      <button class="btn btn-ghost" onclick="clearFilters()">Clear</button>
    </div>
  </div>

  <div class="result-info" id="result-info"></div>
  <div class="card">
    <div class="table-wrap">
      <table>
        <thead id="table-head"></thead>
        <tbody id="table-body"><tr class="loading-row"><td>Use filters above and click Apply</td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<div class="site-footer">
  © 2026 Arcgate Walkathon &nbsp;·&nbsp;
  <a href="privacy.html">Privacy Policy</a>
  <a href="terms.html">Terms of Service</a>
</div>

<script src="_nav.js"></script>
<script>
authGuard();
let currentTab='distance';
function switchTab(t){
  currentTab=t;
  document.querySelectorAll('.tab').forEach((el,i)=>{
    el.classList.toggle('active',['distance','activities','elevation','pace','calories','steps'][i]===t);
  });
  loadLeaderboard();
}
function clearFilters(){
  ['date-from','date-to'].forEach(id=>document.getElementById(id).value='');
  ['sport-filter','team-filter'].forEach(id=>document.getElementById(id).value='');
  loadLeaderboard();
}
function fmtPace(ms){if(!ms)return'—';const p=1000/ms,min=Math.floor(p/60),sec=Math.round(p%60);return`${min}:${sec.toString().padStart(2,'0')} /km`;}
function fmtSpeed(ms){return ms?(ms*3.6).toFixed(1)+' km/h':'—';}
async function loadLeaderboard(){
  document.getElementById('table-body').innerHTML='<tr class="loading-row"><td colspan="7">⏳ Loading rankings...</td></tr>';
  const dateFrom=document.getElementById('date-from').value;
  const dateTo=document.getElementById('date-to').value;
  const sport=document.getElementById('sport-filter').value;
  const team=document.getElementById('team-filter').value;
  let url=`${SUPABASE_URL}/rest/v1/activities?is_flagged=eq.false&is_deleted=eq.false&order=activity_date.desc`;
  if(dateFrom) url+=`&activity_date=gte.${dateFrom}`;
  if(dateTo)   url+=`&activity_date=lte.${dateTo}T23:59:59`;
  if(sport)    url+=`&sport_type=eq.${sport}`;
  const [actRes,regRes]=await Promise.all([
    fetch(url,{headers:HDR}),
    fetch(`${SUPABASE_URL}/rest/v1/registration?select=strava_athlete_id,full_name,leaderboard_team`,{headers:HDR})
  ]);
  let acts=await actRes.json();
  const regs=await regRes.json();
  const regMap={};
  regs.forEach(r=>regMap[r.strava_athlete_id]=r);
  if(team) acts=acts.filter(a=>regMap[a.strava_athlete_id]?.leaderboard_team===team);
  const athMap={};
  acts.forEach(a=>{
    const id=a.strava_athlete_id;
    if(!athMap[id]) athMap[id]={id,name:regMap[id]?.full_name||'Unknown',team:regMap[id]?.leaderboard_team||'—',activities:0,dist:0,elev:0,cals:0,steps:0,moving:0,speedSum:0,speedCnt:0,types:new Set()};
    const e=athMap[id];
    e.activities++; e.dist+=a.distance_meters||0; e.elev+=a.elevation_gain||0;
    e.cals+=a.calories||0; e.steps+=a.steps||0; e.moving+=a.moving_time_seconds||0;
    if(a.avg_speed){e.speedSum+=a.avg_speed;e.speedCnt++;}
    if(a.sport_type) e.types.add(a.sport_type);
  });
  let aths=Object.values(athMap);
  if(currentTab==='distance')   aths.sort((a,b)=>b.dist-a.dist);
  if(currentTab==='activities') aths.sort((a,b)=>b.activities-a.activities);
  if(currentTab==='elevation')  aths.sort((a,b)=>b.elev-a.elev);
  if(currentTab==='pace')       aths.sort((a,b)=>(b.speedSum/b.speedCnt||0)-(a.speedSum/a.speedCnt||0));
  if(currentTab==='calories')   aths.sort((a,b)=>b.cals-a.cals);
  if(currentTab==='steps')      aths.sort((a,b)=>b.steps-a.steps);
  document.getElementById('result-info').textContent=`${aths.length} participants · ${acts.length} activities`;
  const heads={
    distance:  ['Rank','Athlete','Team','Activities','Total distance','Total time','Elevation'],
    activities:['Rank','Athlete','Team','Activities','Total distance','Calories','Types'],
    elevation: ['Rank','Athlete','Team','Activities','Total elevation','Total distance','Types'],
    pace:      ['Rank','Athlete','Team','Activities','Avg pace / speed','Total distance','Types'],
    calories:  ['Rank','Athlete','Team','Activities','Total calories','Total distance','Types'],
    steps:     ['Rank','Athlete','Team','Activities','Total steps','Total distance','Types']
  };
  document.getElementById('table-head').innerHTML='<tr>'+heads[currentTab].map(h=>`<th>${h}</th>`).join('')+'</tr>';
  if(!aths.length){document.getElementById('table-body').innerHTML='<tr class="loading-row"><td colspan="7">No data found</td></tr>';return;}
  document.getElementById('table-body').innerHTML=aths.map((a,i)=>{
    const avgSpd=a.speedCnt?a.speedSum/a.speedCnt:0;
    const typeStr=[...a.types].map(t=>`<span class="badge ${badgeClass(t)}">${t}</span>`).join(' ');
    const rankCls=i===0?'r1':i===1?'r2':i===2?'r3':'';
    const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':`#${i+1}`;
    let cols='';
    if(currentTab==='distance')   cols=`<td>${a.activities}</td><td><strong>${(a.dist/1000).toFixed(2)} km</strong></td><td>${fmtDuration(a.moving)}</td><td>${a.elev.toFixed(0)} m</td>`;
    if(currentTab==='activities') cols=`<td><strong>${a.activities}</strong></td><td>${(a.dist/1000).toFixed(2)} km</td><td>${a.cals.toFixed(0)} kcal</td><td>${typeStr}</td>`;
    if(currentTab==='elevation')  cols=`<td>${a.activities}</td><td><strong>${a.elev.toFixed(0)} m</strong></td><td>${(a.dist/1000).toFixed(2)} km</td><td>${typeStr}</td>`;
    if(currentTab==='pace')       cols=`<td>${a.activities}</td><td><strong>${fmtPace(avgSpd)}</strong> <span style="color:#aaa;font-size:12px">${fmtSpeed(avgSpd)}</span></td><td>${(a.dist/1000).toFixed(2)} km</td><td>${typeStr}</td>`;
    if(currentTab==='calories')   cols=`<td>${a.activities}</td><td><strong>${a.cals.toFixed(0)} kcal</strong></td><td>${(a.dist/1000).toFixed(2)} km</td><td>${typeStr}</td>`;
    if(currentTab==='steps')      cols=`<td>${a.activities}</td><td><strong>${a.steps.toLocaleString()} steps</strong></td><td>${(a.dist/1000).toFixed(2)} km</td><td>${typeStr}</td>`;
    return`<tr><td><span class="rank-num ${rankCls}">${medal}</span></td><td><a href="https://www.strava.com/athletes/${a.id}" target="_blank" class="ath">${a.name}</a></td><td style="font-size:12px;color:#888">${a.team}</td>${cols}</tr>`;
  }).join('');
}
loadLeaderboard();
</script>
</body>
</html>
