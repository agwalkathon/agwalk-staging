<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Participants</title><style>body{font-family:Arial,sans-serif;background:#f5f5f5;margin:0;color:#1a1a1a}.site-header{background:#fff;border-bottom:3px solid #E8622A;padding:12px 28px;display:flex;justify-content:space-between;align-items:center}.site-header img{height:40px}.site-header a{font-size:13px;color:#555;text-decoration:none;padding:6px 10px;border-radius:6px}.site-header a.active{background:#E8622A;color:#fff}.bar{background:#1a1a1a;color:#fff;padding:18px 28px;display:flex;justify-content:space-between}.content{padding:24px 28px}.cards{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:18px}.card{background:#fff;border-radius:12px;padding:16px 20px;min-width:150px;box-shadow:0 2px 10px #0001;border-left:4px solid #E8622A}.val{font-size:24px;font-weight:700;color:#E8622A}.lbl{font-size:12px;color:#888}.toolbar{background:#fff;border-radius:12px;padding:14px;margin-bottom:18px;box-shadow:0 2px 10px #0001}input,select{padding:8px;border:1px solid #ddd;border-radius:8px}.tablebox{background:#fff;border-radius:12px;box-shadow:0 2px 10px #0001;overflow:auto}table{width:100%;border-collapse:collapse;min-width:1000px}th{background:#fafafa;text-align:left;font-size:11px;color:#888;text-transform:uppercase;padding:10px;border-bottom:2px solid #eee}td{padding:10px;border-bottom:1px solid #f4f4f4;font-size:13px}.badge{padding:3px 8px;border-radius:20px;font-size:12px}.ok{background:#e8f5e9;color:#2e7d32}.warn{background:#fff3e0;color:#e65100}.muted{color:#999;font-size:11px}.ath{color:#E8622A;text-decoration:none;font-weight:600}</style></head><body><div class="site-header"><img src="aw_logo.jpg"><nav>
    <a href="admin.html">Dashboard</a>
    <a href="activities.html">Activities</a>
    <a href="ag-leaderboard.html">AG Leaderboards</a>
    <a href="ag-config.html">Config</a>
    <a href="participants.html" class="active">Participants</a>
    <a href="participant-requests.html">Requests</a>
    <a href="data-upload.html">Data Upload</a>
    <a href="email-send.html">Email Send</a>
    <a href="#" onclick="logout();return false;">Sign out</a>
  </nav></div><div class="bar"><h2>👥 Participants</h2><a href="admin.html" style="color:#aaa;text-decoration:none">← Dashboard</a></div><div class="content"><div class="cards"><div class="card"><div class="val" id="s-total">—</div><div class="lbl">Total registered</div></div><div class="card"><div class="val" id="s-connected">—</div><div class="lbl">Strava connected</div></div><div class="card"><div class="val" id="s-active">—</div><div class="lbl">Have activities</div></div><div class="card"><div class="val" id="s-km">—</div><div class="lbl">Total km</div></div></div><div class="toolbar"><input id="search" oninput="filterTable()" placeholder="Search name, email or team" style="width:260px"><select id="status-filter" onchange="filterTable()"><option value="">All statuses</option><option value="active">Has activities</option><option value="inactive">No activities</option><option value="connected">Strava connected</option><option value="notconnected">Not connected</option></select><span id="count" class="muted" style="float:right;margin-top:9px"></span></div><div class="tablebox"><table><thead><tr><th>#</th><th>Name</th><th>Role</th><th>Team</th><th>Shift</th><th>Gender</th><th>T-shirt</th><th>Lead</th><th>Strava</th><th>Activities</th><th>Total km</th><th>Status</th></tr></thead><tbody id="participants-body"><tr><td colspan="12" style="text-align:center;padding:40px;color:#999">Loading...</td></tr></tbody></table></div></div><script>
const SUPABASE_URL='https://jhdgkncpkrttvemvwukc.supabase.co';
const SUPABASE_ANON=atob('ZXlKaGJHY2lPaUpJVXpJMU5pSXNJblI1Y0NJNklrcFhWQ0o5')+'.'+atob('ZXlKcGMzTWlPaUp6ZFhCaFltRnpaU0lzSW5KbFppSTZJbXBvWkdkcmJtTndhM0owZEhabGJYWjNkV3RqSWl3aWNtOXNaU0k2SW1GdWIyNGlMQ0pwWVhRaU9qRTNPREUyTnpneU5qTXNJbVY0Y0NJNk1qQTVOekkxTkRJMk0zMA==')+'.'+atob('ZDdtdlhPWURxNUc0YXFzMU1iQzZIRk5nVEJsUWs0QjZhaDBlYWhFX3laRQ==');
const HDR={apikey:SUPABASE_ANON,Authorization:'Bearer '+SUPABASE_ANON,'Content-Type':'application/json'};let allRows=[];
function authGuard(){const s=JSON.parse(sessionStorage.getItem('wk_admin')||'{}');if(!s.loggedIn||s.expires<Date.now()||s.role!=='admin')location.href='admin-login.html'}
function logout(){sessionStorage.removeItem('wk_admin');sessionStorage.removeItem('wk_user');location.href='admin-login.html'}
function esc(v){return String(v==null?'':v).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
async function getAll(url){let all=[],from=0;while(true){const r=await fetch(url+(url.includes('?')?'&':'?')+'limit=1000&offset='+from,{headers:HDR});if(!r.ok)throw new Error(await r.text());const p=await r.json();if(!Array.isArray(p)||!p.length)break;all=all.concat(p);if(p.length<1000)break;from+=1000}return all}
function roleDrop(p){const id=p.strava_athlete_id,role=p.role||'user';if(!id)return 'No Strava ID';return '<select id="role-'+id+'" data-current="'+role+'" onchange="saveRole(\''+id+'\',this.value)"><option value="user" '+(role==='user'?'selected':'')+'>User</option><option value="admin" '+(role==='admin'?'selected':'')+'>Admin</option></select><div class="muted" id="note-'+id+'"></div>'}
function renderRows(rows){document.getElementById('participants-body').innerHTML=rows.length?rows.map((p,i)=>'<tr><td>'+(i+1)+'</td><td><a class="ath" target="_blank" href="https://www.strava.com/athletes/'+p.strava_athlete_id+'">'+esc(p.full_name||'—')+'</a><div class="muted">'+esc(p.email||'')+'</div></td><td>'+roleDrop(p)+'</td><td>'+esc(p.leaderboard_team||'—')+'</td><td>'+esc(p.shift||'—')+'</td><td>'+esc(p.gender||'—')+'</td><td>'+esc(p.tshirt_size||'—')+'</td><td>'+esc(p.project_lead||'—')+'</td><td><span class="badge '+(p.connected?'ok':'warn')+'">'+(p.connected?'Connected':'Not yet')+'</span></td><td>'+(p.cnt||0)+'</td><td>'+(p.dist?(p.dist/1000).toFixed(1)+' km':'—')+'</td><td><span class="badge '+(p.cnt>0?'ok':'warn')+'">'+(p.cnt>0?'Active':'Pending')+'</span></td></tr>').join(''):'<tr><td colspan="12" style="text-align:center;padding:40px;color:#999">No participants found</td></tr>'}
function filterTable(){const q=document.getElementById('search').value.toLowerCase(),st=document.getElementById('status-filter').value;const rows=allRows.filter(r=>{const mq=!q||[r.full_name,r.email,r.leaderboard_team].join(' ').toLowerCase().includes(q);const ms=!st?true:st==='active'?r.cnt>0:st==='inactive'?r.cnt===0:st==='connected'?r.connected:!r.connected;return mq&&ms});document.getElementById('count').textContent=rows.length+' of '+allRows.length+' participants';renderRows(rows)}
async function saveRole(id,newRole){const sel=document.getElementById('role-'+id),note=document.getElementById('note-'+id),old=sel.dataset.current;if(!confirm('Change role to '+newRole+'?')){sel.value=old;return}try{note.textContent='Saving...';const r=await fetch(SUPABASE_URL+'/rest/v1/registration?strava_athlete_id=eq.'+encodeURIComponent(id),{method:'PATCH',headers:{...HDR,Prefer:'return=representation'},body:JSON.stringify({role:newRole})});const txt=await r.text();if(!r.ok)throw new Error(txt);const arr=JSON.parse(txt||'[]');if(!arr.length)throw new Error('No row updated');const row=allRows.find(x=>String(x.strava_athlete_id)===String(id));if(row)row.role=newRole;sel.dataset.current=newRole;note.textContent='Saved ✅'}catch(e){sel.value=old;note.textContent='Not saved ❌';alert('Role not saved: '+e.message)}}
async function loadParticipants(){try{const regs=await getAll(SUPABASE_URL+'/rest/v1/registration?order=full_name.asc');const parts=await getAll(SUPABASE_URL+'/rest/v1/participants?select=strava_athlete_id');const acts=await getAll(SUPABASE_URL+'/rest/v1/activities?select=strava_athlete_id,distance_meters&is_deleted=eq.false');const conn=new Set(parts.map(p=>p.strava_athlete_id));const am={};acts.forEach(a=>{if(!am[a.strava_athlete_id])am[a.strava_athlete_id]={cnt:0,dist:0};am[a.strava_athlete_id].cnt++;am[a.strava_athlete_id].dist+=a.distance_meters||0});allRows=regs.map(r=>({...r,role:r.role||'user',connected:conn.has(r.strava_athlete_id),cnt:am[r.strava_athlete_id]?.cnt||0,dist:am[r.strava_athlete_id]?.dist||0}));document.getElementById('s-total').textContent=allRows.length;document.getElementById('s-connected').textContent=allRows.filter(r=>r.connected).length;document.getElementById('s-active').textContent=allRows.filter(r=>r.cnt>0).length;document.getElementById('s-km').textContent=(allRows.reduce((s,r)=>s+r.dist,0)/1000).toFixed(1)+' km';filterTable()}catch(e){document.getElementById('participants-body').innerHTML='<tr><td colspan="12" style="text-align:center;padding:40px;color:#c62828">Error loading participants: '+esc(e.message)+'</td></tr>'}}
authGuard();loadParticipants();
</script></body></html>
