<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Walkathon Admin — Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .logo { text-align: center; font-size: 40px; margin-bottom: 8px; }
    h1 { text-align: center; font-size: 22px; color: #1a1a2e; margin-bottom: 4px; }
    .subtitle { text-align: center; font-size: 13px; color: #999; margin-bottom: 32px; }
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 12px; color: #666; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
    .field input {
      width: 100%;
      padding: 11px 14px;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      font-size: 15px;
      color: #333;
      transition: border 0.2s;
    }
    .field input:focus { outline: none; border-color: #FC4C02; }
    .btn-login {
      width: 100%;
      padding: 13px;
      background: #1a1a2e;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s;
    }
    .btn-login:hover { background: #2d2d4e; }
    .error {
      display: none;
      background: #ffebee;
      color: #c62828;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 14px;
      margin-top: 16px;
      text-align: center;
    }
    .footer { text-align: center; margin-top: 24px; font-size: 12px; color: #bbb; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">🛡️</div>
  <h1>Admin Access</h1>
  <p class="subtitle">Walkathon 2026 — Restricted area</p>

  <div class="field">
    <label>Email</label>
    <input type="email" id="email" placeholder="admin@example.com" autocomplete="off">
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••">
  </div>

  <button class="btn-login" onclick="doLogin()">Sign in</button>
  <div class="error" id="error-msg">❌ Invalid email or password</div>

  <div class="footer">Walkathon 2026 · Admin Portal</div>
</div>

<script>
  // SHA-256 hash of credentials — plain text never stored
  // Email:    pra@arcgate.com
  // Password: Prakash@123
  const VALID_EMAIL_HASH    = '3d30f639abb9e75cf8d20cebff2a289eab3aebe6a43156a72dcc186ee5fcba83';
  const VALID_PASSWORD_HASH = '173190d539938a402bd13cc767cb2977973cc288349cb485d2a44c147658872e';

  async function sha256(message) {
    const msgBuffer = new TextEncoder().encode(message);
    const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
  }

  async function doLogin() {
    const email    = document.getElementById('email').value.trim().toLowerCase();
    const password = document.getElementById('password').value;

    const emailHash    = await sha256(email);
    const passwordHash = await sha256(password);

    if (emailHash === VALID_EMAIL_HASH && passwordHash === VALID_PASSWORD_HASH) {
      // Store session (expires in 8 hours)
      const session = {
        loggedIn: true,
        expires:  Date.now() + (8 * 60 * 60 * 1000)
      };
      sessionStorage.setItem('wk_admin', JSON.stringify(session));
      window.location.href = 'admin.html';
    } else {
      document.getElementById('error-msg').style.display = 'block';
    }
  }

  // Allow Enter key to submit
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  // Redirect if already logged in
  const existing = JSON.parse(sessionStorage.getItem('wk_admin') || '{}');
  if (existing.loggedIn && existing.expires > Date.now()) {
    window.location.href = 'admin.html';
  }
</script>
</body>
</html>
