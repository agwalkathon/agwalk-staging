  <script>
  (function() {
    var DISMISS_KEY = 'pwa_banner_dismissed';
    var DISMISS_DAYS = 7;
    var banner = document.getElementById('pwa-banner');
    var installBtn = document.getElementById('pwa-install-btn');
    var dismissBtn = document.getElementById('pwa-dismiss-btn');
    var iosTip = document.getElementById('pwa-ios-tip');
    var deferredPrompt = null;

    function isIOS() {
      return /iphone|ipad|ipod/i.test(navigator.userAgent);
    }
    function isSafari() {
      return /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
    }
    function isInStandaloneMode() {
      return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
    }
    function isDismissed() {
      try {
        var val = localStorage.getItem(DISMISS_KEY);
        if (!val) return false;
        return Date.now() < parseInt(val, 10);
      } catch(e) { return false; }
    }
    function setDismissed() {
      try {
        localStorage.setItem(DISMISS_KEY, String(Date.now() + DISMISS_DAYS * 86400000));
      } catch(e) {}
    }
    function showBanner() {
      banner.style.display = 'block';
      // Add bottom padding to body so content isn't hidden behind banner
      document.body.style.paddingBottom = '80px';
    }
    function hideBanner() {
      banner.style.display = 'none';
      document.body.style.paddingBottom = '';
    }

    // Don't show if already installed or dismissed
    if (isInStandaloneMode() || isDismissed()) return;

    // iOS Safari: can't auto-prompt, show manual tip
    if (isIOS() && isSafari()) {
      installBtn.style.display = 'none';
      iosTip.style.display = 'block';
      showBanner();
      dismissBtn.addEventListener('click', function() { setDismissed(); hideBanner(); });
      return;
    }

    // Android / Chrome: wait for beforeinstallprompt
    window.addEventListener('beforeinstallprompt', function(e) {
      e.preventDefault();
      deferredPrompt = e;
      showBanner();
    });

    installBtn.addEventListener('click', function() {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(function(result) {
        if (result.outcome === 'accepted') {
          hideBanner();
        }
        deferredPrompt = null;
      });
    });

    dismissBtn.addEventListener('click', function() {
      setDismissed();
      hideBanner();
    });

    // Hide if app gets installed mid-session
    window.addEventListener('appinstalled', function() { hideBanner(); });
  })();
  </script>
