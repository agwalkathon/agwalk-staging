<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    (function(){
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for (var i = 0; i < registrations.length; i++) {
            registrations[i].update();
          }
        });
      }
      if ('caches' in window) {
        caches.keys().then(function(keys) {
          keys.forEach(function(key) {
            caches.delete(key);
          });
        });
      }
    })();
  </script>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#E8622A">
  <link rel="manifest" href="/agwalk-staging/manifest.json">
  <meta name="apple-mobile-web-app-title" content="Togethera Walkathon">
  <link rel="apple-touch-icon" href="/agwalk-staging/icon-192.png">
  <title>Sign In — Togethera</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="app.css?v=20260704_v102">
  <style>
    /* Prevent Flash of Unstyled Content (FOUC) and visual jumps */
    #login-screen {
      display: flex !important;
    }
  </style>
  <script>
    (function(){
      // 1. Synchronously inject cached branding style to prevent FOUC
      try {
        var cached = localStorage.getItem('ag_branding_cache');
        if (cached) {
          var b = JSON.parse(cached);
          if (b.accent_color) {
            var hexToRgba = function(hex, alpha) {
              var c = hex.replace('#', '');
              if (c.length === 3) c = c[0] + c[0] + c[1] + c[1] + c[2] + c[2];
              var rVal = parseInt(c.substring(0, 2), 16);
              var gVal = parseInt(c.substring(2, 4), 16);
              var bVal = parseInt(c.substring(4, 6), 16);
              return 'rgba(' + rVal + ',' + gVal + ',' + bVal + ',' + alpha + ')';
            };
            document.write('<style id="sync-branding-style">' +
              '.login-btn { background: ' + b.accent_color + ' !important; box-shadow: 0 4px 20px ' + hexToRgba(b.accent_color, 0.28) + ' !important; }' +
              '.login-link, .login-terms a { color: ' + b.accent_color + ' !important; }' +
              '#br-app-name { color: ' + b.accent_color + ' !important; }' +
              'input.login-field:focus { border-color: ' + b.accent_color + ' !important; }' +
            '</style>');
          }
        }
      } catch(e){}

      function decodeJwt(token) {
        try {
          var base64Url = token.split('.')[1];
          var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
          var pad = base64.length % 4;
          if (pad) {
            if (pad === 1) return null;
            base64 += new Array(5 - pad).join('=');
          }
          var jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
            return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
          }).join(''));
          return JSON.parse(jsonPayload);
        } catch(e) {
          return null;
        }
      }
      var isEmp = false;
      try {
        var t = localStorage.getItem('ag_emp_token');
        if (t) {
          var p = decodeJwt(t);
          isEmp = p && p.exp && p.exp * 1000 > Date.now();
        }
      } catch(e){}
      var isPart = false;
      try {
        var u = JSON.parse(localStorage.getItem('wk_user') || '{}');
        isPart = u && u.loggedIn;
      } catch(e){}
      if (isEmp || isPart) {
        var cb = "v=" + Date.now();
        var qs = window.location.search ? ("&" + window.location.search.substring(1)) : "";
        window.location.replace("app.html?" + cb + qs);
      } else {
        document.write('<style>#splash-screen { display: none !important; }</style>');
      }
    })();
  </script>
</head>
<body>

<!-- ============ LOGIN ============ -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo"><img id="login-logo-img" src="" alt="Logo" style="opacity:0; transition:opacity 0.25s;"></div>
    <div id="br-app-name" style="font-size: 26px; font-weight: 900; color: var(--brand); text-align: center; margin-top: -10px; margin-bottom: 20px; letter-spacing: -0.5px; opacity: 0; transition: opacity 0.25s;"></div>
    <div class="login-title" id="br-login-title">&nbsp;</div>
    <div class="login-sub" id="br-login-sub">&nbsp;</div>

    <div class="login-glass">
      <div id="step-email">
        <label class="login-field-label" for="in-email">Registered Email</label>
        <input type="email" class="login-field" id="in-email" placeholder="you@company.com" autocomplete="email">
        <button class="login-btn" id="btn-send" onclick="sendCode()">Send Login Code</button>
        <div class="login-err" id="err-email"></div>
      </div>

      <div id="step-otp" class="hidden">
        <label class="login-field-label" style="text-align:center">Verification Code</label>
        <div class="otp-boxes" id="otp-boxes"></div>
        <div class="login-field-hint">A 6-digit code was emailed to you</div>
        <button class="login-btn" id="btn-verify" onclick="verifyCode()">Verify &amp; Sign In</button>
        <div class="login-err" id="err-otp"></div>
        <div class="login-resend-row">
          <button class="login-link" id="btn-resend" onclick="sendCode()">Resend code</button>
          &nbsp;·&nbsp;
          <button class="login-link" id="btn-back" onclick="document.getElementById('step-otp').classList.add('hidden');document.getElementById('step-email').classList.remove('hidden');">Change email</button>
        </div>
      </div>

      <div class="login-terms">
        By continuing, you are agreeing to our <a href="terms.html">Terms of Service</a> and <a href="privacy.html">Privacy Policy</a>.
      </div>
    </div>

    <p class="login-footnote">Sessions last 30 days <span>·</span> Read-only <span>·</span> Never posts to Strava</p>
  </div>
</div>

<!-- ── Splash Screen ──────────────────────────────────────────────────── -->
<div id="splash-screen" style="
  position:fixed;inset:0;z-index:10000;
  background:#0E1012;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  transition:opacity 0.4s ease;
">
  <div style="display:flex;flex-direction:column;align-items:center;gap:32px;">
    <img
      src="logo-chevron.png"
      alt="Walkathon"
      style="width:min(140px,40vw);
             animation:splashPulse 1.8s ease-in-out infinite;"
    >
    <div style="display:flex;gap:9px;align-items:center;">
      <div class="splash-dot" style="animation-delay:0s"></div>
      <div class="splash-dot" style="animation-delay:0.2s"></div>
      <div class="splash-dot" style="animation-delay:0.4s"></div>
    </div>
    <div id="splash-text" style="color:rgba(255,255,255,0.7);font-size:14px;font-weight:500;font-family:var(--font);margin-top:-8px;text-align:center;display:none;"></div>
  </div>
</div>

<!-- ── Maintenance Block Overlay ─────────────────────────────────────────── -->
<div id="maintenance-overlay" style="
  position:fixed;inset:0;z-index:20000;
  background:#0E1012;
  display:none;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;padding:32px;
">
  <div style="
    width:88px;height:88px;border-radius:50%;
    background:rgba(232,98,42,0.12);
    display:flex;align-items:center;justify-content:center;
    margin-bottom:28px;
    animation:maintPulse 2s ease-in-out infinite;
  ">
    <svg viewBox="0 0 24 24" width="40" height="40" fill="none" stroke="#E8622A" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="animation:maintSpin 3.5s linear infinite;">
      <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
    </svg>
  </div>
  <div style="font-size:20px;font-weight:800;color:#fff;font-family:var(--font);margin-bottom:10px;" id="maintenance-message">App is Under Maintenance</div>
  <div style="font-size:14px;color:rgba(255,255,255,0.55);font-family:var(--font);max-width:320px;line-height:1.5;">
    We're making some improvements. Please check back shortly.
  </div>
</div>
<style>
@keyframes maintPulse {
  0%, 100% { transform:scale(1); box-shadow:0 0 0 0 rgba(232,98,42,0.25); }
  50% { transform:scale(1.06); box-shadow:0 0 0 14px rgba(232,98,42,0); }
}
@keyframes maintSpin {
  from { transform:rotate(0deg); }
  to { transform:rotate(360deg); }
}
</style>

<script src="app-config.js?v=20260704_v102" defer></script>
<script src="app-employee.js?v=20260704_v102" defer></script>
<script>
  window.addEventListener('load', function() {
    if (typeof loadBranding === 'function') {
      loadBranding();
    }
  });
</script>

</body>
</html>
