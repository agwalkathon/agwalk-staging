<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flagged Activities — Arcgate Walkathon 2026</title>
  <link rel="stylesheet" href="_shared.css">
  <style>
    .tab-bar { display:flex; gap:8px; margin-bottom:20px; }
    .tab-btn { padding:8px 20px; border-radius:8px; border:1px solid #e8e8e8; font-size:13px; font-weight:500; cursor:pointer; background:white; color:#555; transition:all 0.15s; }
    .tab-btn.active { background:#1A1A1A; color:white; border-color:#1A1A1A; }
  </style>
</head>
<body>
<div class="site-header">
  <img src="aw_logo.jpg" alt="Arcgate Walkathon 2026">
  <nav>
    <a href="admin.html">Dashboard</a>
    <a href="activities.html">Activities</a>
    <a href="leaderboard.html">Leaderboard</a>
    <a href="flagged.html" class="active">Flagged</a>
    <a href="participants.html">Participants</a>
    <a href="#" onclick="logout();return false;">Sign out</a>
  </nav>
</div>

<div class="page-bar">
  <h1>🚩 Flagged Activities</h1>
  <a href="admin.html" class="back">← Dashboard</a>
</div>

<div class="content">
  <div class="tab-bar">
    <button class="tab-btn active" id="tab-flagged" onclick="switchTab('flagged')">🚩 Flagged</button>
    <button class="tab-btn" id="tab-deleted" onclick="switchTab('deleted')">🗑️ Deleted</button>
  </div>
  <div class="summary warn" id="summary">Loading...</div>
  <div class="card">
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>Athlete</th><th>Activity</th><th>Type</th><th>Date & time</th>
          <th>Distance</th><th>Avg speed</th><th>Flag reason</th><th>Action</th>
        </tr></thead>
        <tbody id="flagged-body"><tr class="loading-row"><td colspan="8">Loading...</td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<div class="site-footer">
  © 2026 Arcgate Walkathon &nbsp;·&nbsp;
  <a href="privacy.html">Privacy Policy</a>
  <a href="terms.html">Terms of Service</a>
</div>

<script src="_nav.js"></script>
<script>
authGuard();
let currentTab='flagged', regMap={};
function switchTab(t){
  currentTab=t;
  document.getElementById('tab-flagged').classList.toggle('active',t==='flagged');
  document.getElementById('tab-deleted').classList.toggle('active',t==='deleted');
  loadData();
}
async function loadData(){
  document.getElementById('flagged-body').innerHTML='<tr class="loading-row"><td colspan="8">Loading...</td></tr>';
  const regRes=await fetch(`${SUPABASE_URL}/rest/v1/registration?select=strava_athlete_id,full_name`,{headers:HDR});
  (await regRes.json()).forEach(r=>regMap[r.strava_athlete_id]=r.full_name);
  const url=currentTab==='flagged'
    ?`${SUPABASE_URL}/rest/v1/activities?is_flagged=eq.true&is_deleted=eq.false&order=activity_date.desc`
    :`${SUPABASE_URL}/rest/v1/activities?is_deleted=eq.true&order=activity_date.desc`;
  const acts=await (await fetch(url,{headers:HDR})).json();
  const sum=document.getElementById('summary');
  if(currentTab==='flagged'){
    sum.className=acts.length?'summary warn':'summary ok';
    sum.textContent=acts.length?`⚠️ ${acts.length} activit${acts.length===1?'y':'ies'} flagged for review`:'✅ No flagged activities — everything looks clean!';
  } else {
    sum.className='summary info';
    sum.textContent=`🗑️ ${acts.length} deleted activit${acts.length===1?'y':'ies'} — can be restored anytime`;
  }
  if(!acts.length){
    document.getElementById('flagged-body').innerHTML=`<tr><td colspan="8" style="text-align:center;padding:48px;color:#bbb">${currentTab==='flagged'?'🎉 No flagged activities!':'No deleted activities'}</td></tr>`;
    return;
  }
  document.getElementById('flagged-body').innerHTML=acts.map(a=>`<tr id="row-${a.id}">
    <td><a href="https://www.strava.com/athletes/${a.strava_athlete_id}" target="_blank" class="ath">${regMap[a.strava_athlete_id]||'Unknown'}</a></td>
    <td>${a.activity_name||'—'}</td>
    <td><span class="badge ${badgeClass(a.sport_type)}">${a.sport_type||'—'}</span></td>
    <td>${fmtDate(a.activity_date)} ${fmtTime(a.activity_date)}</td>
    <td>${a.distance_meters?(a.distance_meters/1000).toFixed(2)+' km':'—'}</td>
    <td>${a.avg_speed?(a.avg_speed*3.6).toFixed(1)+' km/h':'—'}</td>
    <td style="font-size:12px;color:#e53935">${a.flag_reason||'—'}</td>
    <td style="display:flex;gap:6px">
      ${currentTab==='flagged'?`
        <button class="btn btn-green" onclick="clearFlag(${a.id})">✅ Clear</button>
        <button class="btn btn-red" onclick="softDelete(${a.id})">🗑️ Delete</button>
      `:`<button class="btn btn-blue" onclick="restore(${a.id})">↩️ Restore</button>`}
    </td>
  </tr>`).join('');
}
async function patch(id,data){
  await fetch(`${SUPABASE_URL}/rest/v1/activities?id=eq.${id}`,{method:'PATCH',headers:{...HDR,'Content-Type':'application/json'},body:JSON.stringify(data)});
  document.getElementById(`row-${id}`).remove();
}
function clearFlag(id){patch(id,{is_flagged:false,flag_reason:'Manually cleared by admin'});}
function softDelete(id){if(confirm('Mark as deleted? Can be restored later.')) patch(id,{is_deleted:true,deleted_reason:'Deleted by admin'});}
function restore(id){patch(id,{is_deleted:false,deleted_reason:null});}
loadData();
</script>
</body>
</html>
