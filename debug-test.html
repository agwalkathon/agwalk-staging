<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Debug Test</title>
<style>
body{background:#0A0C10;color:#fff;font-family:monospace;padding:20px;font-size:14px;}
pre{white-space:pre-wrap;word-break:break-all;background:#1a1a2e;padding:16px;border-radius:8px;margin-top:12px;}
button{background:#E8622A;color:#fff;border:none;padding:12px 24px;border-radius:8px;font-size:16px;margin-top:16px;width:100%;}
</style>
</head>
<body>
<h2>Debug Test Page</h2>
<p id="status">Reading session...</p>
<p id="expiry"></p>
<pre id="out"></pre>
<button onclick="testFetch()">Test Supabase Fetch</button>
<pre id="fetch-out">Fetch result will appear here</pre>

<script>
// Step 1: Read session
var raw = localStorage.getItem('wk_user') || 'NOT FOUND';
document.getElementById('status').textContent = 'Session: ' + (raw === 'NOT FOUND' ? 'MISSING' : 'FOUND');
document.getElementById('out').textContent = raw;
if (raw !== 'NOT FOUND') {
  var s = JSON.parse(raw);
  var now = Date.now();
  var exp = s.expires || 0;
  document.getElementById('expiry').textContent = 
    'loggedIn=' + s.loggedIn + 
    ' | athleteId=' + s.athleteId +
    ' | expires in: ' + Math.round((exp - now)/1000/60) + ' min' +
    ' | GUARD: ' + (!s.loggedIn || exp < now || !s.athleteId ? 'FAIL→redirect' : 'PASS');
}

// Step 2: Test Supabase fetch
async function testFetch() {
  document.getElementById('fetch-out').textContent = 'Fetching...';
  var ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpoZGdrbmNwa3J0dHZlbXZ3dWtjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2NzgyNjMsImV4cCI6MjA5NzI1NDI2M30.d7mvXOYDq5G4aqs1Mbc6HFNgTBlQk4B6ah0eahE_yZE';
  var SUPABASE = 'https://jhdgkncpkrttvemvwukc.supabase.co';
  try {
    var s = JSON.parse(raw);
    var aid = s.athleteId;
    document.getElementById('fetch-out').textContent = 'athleteId: ' + aid + '\nFetching registration...';
    var r = await fetch(SUPABASE+'/rest/v1/registration?strava_athlete_id=eq.'+aid+'&select=full_name,emp_code', {
      headers: {apikey: ANON, Authorization: 'Bearer '+ANON}
    });
    document.getElementById('fetch-out').textContent = 'HTTP Status: '+r.status+'\n';
    var d = await r.json();
    document.getElementById('fetch-out').textContent += JSON.stringify(d, null, 2);
  } catch(e) {
    document.getElementById('fetch-out').textContent = 'ERROR: ' + e.message;
  }
}
</script>
</body>
</html>
