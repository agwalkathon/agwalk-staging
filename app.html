<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0e1115">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="favicon.png">
<link rel="manifest" href="manifest.json">
<title>Arcgate — Employee App</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --brand:#E8622A; --brand-dim:rgba(232,98,42,0.15);
  --bg:#0e1115; --surface:#282e36; --surface2:#363c46;
  --border:rgba(255,255,255,0.07);
  --text:#FFFFFF; --muted:rgba(255,255,255,0.52); --label:rgba(255,255,255,0.48); --dim:rgba(255,255,255,0.20);
  --green:#22C55E; --gold:#FFD000;
  --radius:16px; --radius-sm:12px; --radius-xs:8px;
  --font:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  --brand-soft:#F97D4E;
}
html{background:#0e1115}
body{
  font-family:var(--font);
  background:linear-gradient(180deg,#1f262d 0%,#0e1115 100%);
  background-attachment:fixed;background-size:100% 100dvh;
  color:var(--text);min-height:100dvh;
  -webkit-font-smoothing:antialiased;letter-spacing:-0.011em;
}
.hidden{display:none!important}
/* ── Login ── */
#login-screen{min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.login-card{width:100%;max-width:380px}
.login-logo{height:44px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px}
.login-logo img{height:100%;width:auto}
.login-logo .fallback{width:60px;height:60px;border-radius:18px;background:var(--brand);display:flex;align-items:center;justify-content:center;font-size:28px}
.login-title{font-size:21px;font-weight:800;text-align:center;letter-spacing:-0.02em}
.login-sub{font-size:13.5px;color:var(--muted);text-align:center;margin:6px 0 26px}
.login-field{width:100%;padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);color:#fff;font-size:15px;font-family:inherit;margin-bottom:12px}
.login-field:focus{outline:none;border-color:var(--brand)}
.login-btn{width:100%;padding:14px;background:var(--brand);border:none;border-radius:var(--radius-sm);color:#fff;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;box-shadow:0 6px 20px rgba(232,98,42,.3)}
.login-btn:disabled{opacity:.5}
.login-err{color:#F87171;font-size:13px;min-height:18px;margin:8px 0;text-align:center}
.login-hint{font-size:12px;color:var(--label);text-align:center;margin-top:14px}
.otp-boxes{display:flex;gap:8px;justify-content:center;margin-bottom:12px}
.otp-box{width:46px;height:54px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-xs);color:#fff;font-size:22px;font-weight:700;text-align:center;font-family:inherit}
.otp-box:focus{outline:none;border-color:var(--brand)}
.login-link{background:none;border:none;color:var(--brand-soft);font-size:13px;font-family:inherit;cursor:pointer;margin-top:6px}
/* ── App header (exact participant classes) ── */
#app-screen{padding-bottom:96px;min-height:100dvh}
.header{position:sticky;top:0;z-index:200;background:rgba(31,38,45,0.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding:max(14px,env(safe-area-inset-top)) 16px 14px}
.hdr-inner{max-width:540px;margin:0 auto;width:100%;display:flex;align-items:center;justify-content:space-between;gap:8px}
.hdr-left{display:flex;align-items:center;gap:6px;flex:1;min-width:0}
.hdr-logo-img{height:26px;width:auto}
.hdr-center{display:flex;align-items:center;justify-content:center;flex:1.5;min-width:0;font-size:12px;font-weight:700;color:rgba(255,255,255,0.9);text-transform:uppercase;letter-spacing:0.8px;white-space:nowrap}
.hdr-right{display:flex;align-items:center;gap:0;flex:1;justify-content:flex-end;min-width:0}
.hdr-avatar{width:34px;height:34px;border-radius:50%;background:radial-gradient(circle at 30% 30%, #f472b6 0%, #E8622A 70%, #c94a10 100%);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;letter-spacing:0.5px;border:none;box-shadow:0 0 0 2px rgba(232,98,42,0.3), 0 2px 8px rgba(232,98,42,0.25);flex-shrink:0;cursor:pointer;transition:box-shadow 0.2s ease;overflow:hidden}
.hdr-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.hdr-btn{width:38px;height:38px;border-radius:50%;background:none;border:none;color:rgba(255,255,255,0.90);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s ease}
.hdr-btn:hover{background:rgba(255,255,255,0.06);color:#fff}
.hdr-btn:active{transform:scale(0.95);background:rgba(255,255,255,0.12)}
.hdr-btn svg{width:20px;height:20px}
.hdr-date-pill{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);border-radius:20px;padding:5px 12px;display:flex;align-items:center;gap:8px;font-size:10.5px;font-weight:800;letter-spacing:0.5px;color:#fff}
.grad-avatar{border-radius:50%;background:radial-gradient(circle at 30% 30%, #f472b6 0%, #E8622A 70%, #c94a10 100%);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;letter-spacing:0.5px;box-shadow:0 0 0 2px rgba(232,98,42,0.3), 0 2px 8px rgba(232,98,42,0.25);overflow:hidden;flex-shrink:0}
.grad-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
/* ── Content ── */
.tab-pane{padding:16px 16px 20px;max-width:540px;margin:0 auto}
.placeholder{text-align:center;padding:70px 20px;color:var(--label)}
.placeholder .big{font-size:46px;margin-bottom:12px}
.card{background:var(--surface);border-radius:var(--radius);padding:16px;margin-bottom:14px;box-shadow:0 8px 32px 0 rgba(0,0,0,0.3)}
.card .lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--label);margin-bottom:4px}
.card .val{font-size:15px;font-weight:600}
.logout-btn{width:100%;padding:13px;background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.25);border-radius:var(--radius-sm);color:#F87171;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:18px}
.skel{height:80px;border-radius:var(--radius);background:linear-gradient(90deg,#282e36 25%,#323a44 50%,#282e36 75%);background-size:200% 100%;animation:sh 1.4s infinite;margin-bottom:14px}
@keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}
/* ── Floating pill bottom nav (exact participant pattern) ── */
.bottom-nav{
  position:fixed;bottom:calc(2px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);
  width:92%;max-width:480px;
  background:rgba(10,12,16,0.88);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.07);border-radius:28px;
  display:flex;justify-content:space-around;padding:6px;z-index:9999;
  box-shadow:0 10px 40px rgba(0,0,0,0.5);
}
.bnav-item{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 6px;background:none;border:none;cursor:pointer;color:var(--muted);gap:4px;transition:color .3s;position:relative;flex:1;border-radius:22px;z-index:2;font-family:inherit;text-decoration:none}
.bnav-item:hover,.bnav-item:visited,.bnav-item:active{text-decoration:none}
.bnav-label{font-size:10.5px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase}
.bnav-item svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;transition:transform .3s cubic-bezier(0.175,0.885,0.32,1.275)}
.bnav-item.active{color:var(--brand)}
.bnav-item.active svg{transform:scale(1.12);filter:drop-shadow(0 2px 6px rgba(232,98,42,0.45))}
.bnav-indicator{position:absolute;top:6px;bottom:6px;left:0;width:0;background:linear-gradient(135deg,rgba(232,98,42,0.14) 0%,rgba(252,97,0,0.05) 100%);border:1.5px solid rgba(232,98,42,0.2);border-radius:22px;z-index:1;transition:all .38s cubic-bezier(0.25,1,0.25,1.12);pointer-events:none}
</style>
</head>
<body>

<!-- ============ LOGIN ============ -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo"><img src="logo-white.png" alt="Arcgate" onerror="this.parentNode.innerHTML='<div class=fallback>🏆</div>'"></div>
    <div class="login-title">Arcgate Employee App</div>
    <div class="login-sub" id="login-sub">Sign in with your company email</div>

    <div id="step-email">
      <input type="email" class="login-field" id="in-email" placeholder="you@arcgate.com" autocomplete="email">
      <div class="login-err" id="err-email"></div>
      <button class="login-btn" id="btn-send">Send Login Code</button>
    </div>

    <div id="step-otp" class="hidden">
      <div class="otp-boxes" id="otp-boxes"></div>
      <div class="login-err" id="err-otp"></div>
      <button class="login-btn" id="btn-verify">Verify &amp; Sign In</button>
      <div style="text-align:center"><button class="login-link" id="btn-resend">Resend code</button>
      <button class="login-link" id="btn-back">Change email</button></div>
    </div>
    <div class="login-hint">A 6-digit code will be emailed to you. Sessions last 30 days.</div>
  </div>
</div>

<!-- ============ APP ============ -->
<div id="app-screen" class="hidden">
  <header class="header">
    <div class="hdr-inner">
      <div class="hdr-left">
        <div class="hdr-avatar" id="header-avatar" onclick="switchTab('profile')">?</div>
        <button class="hdr-btn" id="bell-btn" title="Notifications" style="position:relative;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <span id="bell-badge" style="position:absolute;top:2px;right:2px;background:#FC6100;color:#fff;border-radius:9px;min-width:10px;height:10px;display:none;border:1.5px solid var(--surface);font-size:8px;line-height:10px;text-align:center;padding:0 2px"></span>
        </button>
      </div>
      <div class="hdr-center"><div class="hdr-date-pill"><span id="hdr-today-date">—</span></div></div>
      <div class="hdr-right">
        <button class="hdr-btn" id="hdr-refresh" title="Refresh">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><polyline points="21 3 21 9 15 9"/></svg>
        </button>
        <button class="hdr-btn" id="hdr-clearcache" title="Clear cache">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
        </button>
      </div>
    </div>
  </header>

  <div class="tab-pane" id="pane-celebrate">
    <div style="margin-bottom:16px;">
      <div id="celebrate-greeting" style="font-size:20px;font-weight:800;letter-spacing:-0.02em;">Hello! 👋</div>
      <div style="font-size:12.5px;color:var(--muted);margin-top:3px;">Every day has something worth celebrating 🎉</div>
    </div>
    <button id="btn-new-post" style="width:100%;padding:13px;background:var(--surface2);border:1px dashed var(--border);border-radius:14px;color:var(--muted);font-family:inherit;font-size:13.5px;cursor:pointer;margin-bottom:14px;text-align:left;padding-left:16px">✨ Share something to celebrate…</button>
    <div id="celebrate-feed"><div class="skel"></div><div class="skel"></div></div>
  </div>

  <!-- new post drawer -->
  <div id="post-drawer" class="hidden" style="position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:10000;display:flex;align-items:flex-start;justify-content:center;padding-top:calc(20px + env(safe-area-inset-top));overflow-y:auto">
    <div style="background:var(--surface);width:calc(100% - 24px);max-width:520px;border-radius:20px;padding:18px;margin-bottom:24px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <div style="font-size:15px;font-weight:600">Share a celebration</div>
        <button id="post-close" style="background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer">✕</button>
      </div>
      <input id="post-title" placeholder="Title (e.g. We got married! 💍)" maxlength="120" style="width:100%;padding:12px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;color:#fff;font-family:inherit;font-size:14px;margin-bottom:10px">

      <div style="display:flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap">
        <button id="post-photo-btn" style="padding:9px 14px;background:var(--surface2);border:1px dashed var(--border);border-radius:10px;color:var(--muted);font-family:inherit;font-size:12.5px;cursor:pointer">📷 Add photos</button>

      <div style="display:flex;justify-content:flex-end">
        <button id="post-submit" title="Post" style="width:40px;height:40px;background:none;border:none;color:var(--brand);cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>

  <div class="tab-pane hidden" id="pane-events">
    <div id="app-events-list"><div class="skel"></div><div class="skel"></div></div>
  </div>

  <div class="tab-pane hidden" id="pane-profile">
    <div id="profile-box"><div class="skel"></div></div>
  </div>

  <div id="notif-panel" class="hidden" style="position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:300">
    <div style="position:absolute;top:calc(58px + env(safe-area-inset-top));left:12px;width:300px;max-width:calc(100vw - 24px);background:rgba(30,30,30,0.97);border:1px solid var(--border);border-radius:12px;box-shadow:0 10px 25px rgba(0,0,0,.5);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);max-height:60dvh;display:flex;flex-direction:column;overflow:hidden">
      <div style="padding:14px 16px;font-size:14px;font-weight:700;border-bottom:1px solid var(--border)">Notifications</div>
      <div id="notif-list" style="overflow-y:auto;flex:1"></div>
    </div>
  </div>

  <div id="reg-drawer" class="hidden" style="position:fixed;inset:0;background:var(--bg);z-index:260;overflow-y:auto;">
    <div style="position:sticky;top:0;background:rgba(14,17,21,.95);backdrop-filter:blur(16px);padding:max(14px,env(safe-area-inset-top)) 16px 12px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);z-index:2;">
      <button id="reg-back" style="background:none;border:none;color:#fff;font-size:20px;cursor:pointer;padding:4px 8px;">←</button>

        <div style="font-size:15px;font-weight:700;">Register</div>
        <div style="font-size:11px;color:var(--brand-soft);font-weight:600;" id="reg-ev-name"></div>
      </div>
    </div>
    <div id="reg-body" style="padding:16px;max-width:540px;margin:0 auto;"></div>
  </div>

  <div id="spec-board" class="hidden" style="position:fixed;inset:0;background:var(--bg);z-index:250;overflow-y:auto;">
    <div style="position:sticky;top:0;background:rgba(14,17,21,.95);backdrop-filter:blur(16px);padding:max(14px,env(safe-area-inset-top)) 16px 12px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);">
      <button id="spec-back" style="background:none;border:none;color:#fff;font-size:20px;cursor:pointer;padding:4px 8px;">←</button>
      <div>
        <div style="font-size:15px;font-weight:700;" id="spec-title">Leaderboard</div>
        <div style="font-size:11px;color:var(--label);" id="spec-sub">Loading…</div>
      </div>
    </div>
    <div id="spec-list" style="padding:14px 16px;max-width:540px;margin:0 auto;"></div>
  </div>

  <nav class="bottom-nav">
    <div class="bnav-indicator" id="bnav-indicator"></div>
    <a class="bnav-item active" id="bnav-celebrate" href="#" data-tab="celebrate" onclick="return false;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      <span class="bnav-label">Celebrate</span>
    </a>
    <a class="bnav-item" id="bnav-events" href="#" data-tab="events" onclick="return false;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <span class="bnav-label">Events</span>
    </a>
    <a class="bnav-item" id="bnav-profile" href="#" data-tab="profile" onclick="return false;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      <span class="bnav-label">Profile</span>
    </a>
  </nav>
</div>

<script>
BACKEND = 'https://agwalk-backend.onrender.com';
SUPABASE_URL = 'https://jhdgkncpkrttvemvwukc.supabase.co';

/* ---------- session ---------- */
function getToken(){ try { return localStorage.getItem('ag_emp_token'); } catch(e){ return null; } }
function setToken(t){ try { localStorage.setItem('ag_emp_token', t); } catch(e){} }
function getEmp(){ try { return JSON.parse(localStorage.getItem('ag_emp') || 'null'); } catch(e){ return null; } }
function setEmp(e){ try { localStorage.setItem('ag_emp', JSON.stringify(e)); } catch(ex){} }
function clearSession(){ try { localStorage.removeItem('ag_emp_token'); localStorage.removeItem('ag_emp'); } catch(e){} }

function tokenValid(t){
  if (!t) return false;
  try {
    var p = JSON.parse(atob(t.split('.')[1]));
    return p.exp && p.exp * 1000 > Date.now();
  } catch(e){ return false; }
}

/* ---------- login flow ---------- */
var _loginEmail = '';
function buildOtpBoxes(){
  var box = document.getElementById('otp-boxes');
  box.textContent = '';
  for (var i = 0; i < 6; i++) {
    var inp = document.createElement('input');
    inp.className = 'otp-box';
    inp.type = 'tel'; inp.maxLength = 1; inp.inputMode = 'numeric';
    inp.setAttribute('data-i', i);
    inp.addEventListener('input', function(){
      this.value = this.value.replace(/\D/g, '');
      if (this.value && this.nextElementSibling) this.nextElementSibling.focus();
    });
    inp.addEventListener('keydown', function(ev){
      if (ev.key === 'Backspace' && !this.value && this.previousElementSibling) this.previousElementSibling.focus();
    });
    inp.addEventListener('paste', function(ev){
      var txt = (ev.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '');
      if (txt.length >= 6) {
        ev.preventDefault();
        var boxes = document.querySelectorAll('.otp-box');
        for (var j = 0; j < 6; j++) boxes[j].value = txt[j] || '';
        boxes[5].focus();
      }
    });
    box.appendChild(inp);
  }
}
function otpValue(){
  return Array.from(document.querySelectorAll('.otp-box')).map(function(b){ return b.value; }).join('');
}

async function sendCode(){
  var email = document.getElementById('in-email').value.trim().toLowerCase();
  var err = document.getElementById('err-email');
  err.textContent = '';
  if (!/^\S+@\S+\.\S+$/.test(email)) { err.textContent = 'Enter a valid email address'; return; }
  var btn = document.getElementById('btn-send');

/* ---------- spectator leaderboard ---------- */
var METRIC_LABELS = { distance_km:'KM', elevation_m:'M', moving_time_min:'MIN', steps:'STEPS', activity_count:'ACTS' };
async function fetchAllRows(url){
  var out = [], from = 0, PAGE = 1000;
  while (true) {
    var r = await fetch(url, { headers: Object.assign({}, HDR, { 'Range-Unit':'items', Range: from + '-' + (from + PAGE - 1) }) });
    var rows = await r.json();
    if (!Array.isArray(rows)) break;
    out = out.concat(rows);
    if (rows.length < PAGE) break;
    from += PAGE;
  }
  return out;
}
async function openSpectatorBoard(ev){
  document.getElementById('spec-board').classList.remove('hidden');
  document.getElementById('spec-title').textContent = ev.name;
  document.getElementById('spec-sub').textContent = 'Loading…';
  var list = document.getElementById('spec-list');
  list.innerHTML = '<div class="skel"></div><div class="skel"></div><div class="skel"></div>';
  try {
    var rc = ev.rules_config || {};
    var slim = '&select=strava_athlete_id,strava_activity_id,distance_meters,activity_date,activity_date_time_ist,is_flagged,sport_type,elevation_gain,moving_time_seconds,steps';
    var results = await Promise.all([
      fetchAllRows(SUPABASE_URL + '/rest/v1/activities?event_id=eq.' + ev.id + '&is_deleted=is.false&order=id.asc' + slim),
      fetchAllRows(SUPABASE_URL + '/rest/v1/registration?event_id=eq.' + ev.id + '&select=strava_athlete_id,full_name,gender,shift,leaderboard_team'),
      fetch(SUPABASE_URL + '/rest/v1/leaderboard_config?event_id=eq.' + ev.id + '&select=config_key,config_value', { headers: HDR }).then(function(r){ return r.json(); }),
      fetch(SUPABASE_URL + '/rest/v1/challenges?event_id=eq.' + ev.id + '&is_active=is.true&select=*', { headers: HDR }).then(function(r){ return r.json(); }),
      fetch(SUPABASE_URL + '/rest/v1/special_scoring_days?event_id=eq.' + ev.id + '&select=special_date', { headers: HDR }).then(function(r){ return r.json(); })
    ]);
    var acts = results[0], regs = results[1];
    // Load THIS event's scoring config into the shared engine globals (same engine participants use)
    (Array.isArray(results[2]) ? results[2] : []).forEach(function(row){
      if (row.config_key === 'bonus_points') CONFIG_LB.bonus = row.config_value.map(function(b){ return { km: Number(b.km), points: Number(b.points || b.pts || 0) }; });
      if (row.config_key === 'base_points') CONFIG_LB.basePer_km = parseFloat(row.config_value.per_km || 1);
      if (row.config_key === 'base_points_per_km') CONFIG_LB.basePer_km = parseFloat(row.config_value) || 1;
    });
    CHALLENGES_LB = Array.isArray(results[3]) ? results[3] : [];
    SPECIAL_DAYS_LB = (Array.isArray(results[4]) ? results[4] : []).map(function(x){ return x.special_date; });
    _LB_EV_RULES = rc.scoring_mode ? rc : null;

    var byAthlete = {};
    acts.forEach(function(a){ var id = String(a.strava_athlete_id); (byAthlete[id] = byAthlete[id] || []).push(a); });
    var raw = (rc.scoring_mode === 'raw');
    var unit = raw ? (METRIC_LABELS[rc.metric] || 'KM') : 'PTS';
    var board = regs.map(function(p){
      var pActs = byAthlete[String(p.strava_athlete_id)] || [];
      var pts = calcFullPtsAdaptive(pActs, p.gender, p.shift);
      return { full_name: p.full_name, team: p.leaderboard_team || null, total: pts.total };
    }).filter(function(r){ return r.total > 0; })
      .sort(function(a, b){ return b.total - a.total; })
      .slice(0, 50);

    document.getElementById('spec-sub').textContent = board.length + ' participants · ranked by ' + (raw ? 'total ' + unit.toLowerCase() : 'points');
    list.textContent = '';
    if (!board.length) { list.innerHTML = '<div class="placeholder"><div class="big">📊</div>No activity yet.</div>'; return; }
    board.forEach(function(row, i){
      var item = document.createElement('div');
      item.style.cssText = 'display:flex;align-items:center;gap:12px;padding:12px 4px;border-bottom:1px solid var(--border);';
      var rk = document.createElement('div');
      rk.style.cssText = 'width:28px;text-align:center;font-size:14px;font-weight:800;color:' + (i<3?'var(--brand)':'var(--label)') + ';flex-shrink:0;';

/* ---------- photo compression + upload ---------- */
function compressImage(file){
  return new Promise(function(resolve, reject){
    var img = new Image();
    var url = URL.createObjectURL(file);
    img.onload = function(){
      URL.revokeObjectURL(url);
      var MAX = 1600;
      var w = img.width, h = img.height;
      if (w > MAX || h > MAX) { var s = MAX / Math.max(w, h); w = Math.round(w*s); h = Math.round(h*s); }
      var cv = document.createElement('canvas'); cv.width = w; cv.height = h;
      cv.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(cv.toDataURL('image/jpeg', 0.82));
    };
    img.onerror = function(){ URL.revokeObjectURL(url); reject(new Error('Could not read image')); };
    img.src = url;
  });
}
async function uploadPhoto(file){
  var dataUrl = await compressImage(file);
  var r = await fetch(BACKEND + '/celebrate/upload', {
    method: 'POST', headers: { 'Content-Type':'application/json', Authorization: 'Bearer ' + getToken() },
    body: JSON.stringify({ data: dataUrl })
  });
  var d = await r.json();
  if (!d.success) throw new Error(d.error || 'Upload failed');
  return d.url;
}

function timeAgo(iso){
  var s = Math.floor((Date.now() - new Date(iso).getTime())/1000);
  if (s < 60) return 'now';
  if (s < 3600) return Math.floor(s/60) + 'm';
  if (s < 86400) return Math.floor(s/3600) + 'h';
  return Math.floor(s/86400) + 'd';
}
var NOTIF_ICONS = { wish_received:'💬', post_approved:'✅', post_rejected:'🚫', birthday:'🎂' };
async function openNotifPanel(){
  var panel = document.getElementById('notif-panel');
  var list = document.getElementById('notif-list');
  panel.classList.remove('hidden');
  _notifOpen = true;
  var items = window._notifItems || [];
  list.textContent = '';
  if (!items.length) {
    list.innerHTML = '<div style="padding:30px 16px;text-align:center;color:var(--label);font-size:13px">No notifications yet 🔕</div>';
  } else {
    items.forEach(function(n){
      var row = document.createElement('div');
      row.style.cssText = 'display:flex;gap:11px;padding:12px 16px;border-bottom:1px solid var(--border);' + (n.is_read ? 'opacity:.6;' : '');
      var ic = document.createElement('div'); ic.style.cssText = 'font-size:19px;flex-shrink:0;'; ic.textContent = NOTIF_ICONS[n.type] || '🔔';
      var bd = document.createElement('div'); bd.style.cssText = 'flex:1;min-width:0;';
      var t = document.createElement('div'); t.style.cssText = 'font-size:13.5px;font-weight:600;line-height:1.35;'; t.textContent = n.title;
      bd.appendChild(t);
      if (n.body) { var b = document.createElement('div'); b.style.cssText = 'font-size:12.5px;color:var(--muted);margin-top:2px;'; b.textContent = n.body; bd.appendChild(b); }
      var tm = document.createElement('div'); tm.style.cssText = 'font-size:11px;color:var(--label);flex-shrink:0;'; tm.textContent = timeAgo(n.created_at);
      row.appendChild(ic); row.appendChild(bd); row.appendChild(tm);
      list.appendChild(row);
    });
  }
  // mark all read
  try {
    await fetch(BACKEND + '/employee/notifications/read', { method:'POST', headers: { Authorization: 'Bearer ' + getToken() } });
    document.getElementById('bell-badge').style.display = 'none';
    (window._notifItems || []).forEach(function(n){ n.is_read = true; });
  } catch(e){}
}
document.getElementById('bell-btn').addEventListener('click', function(){
  if (_notifOpen) { document.getElementById('notif-panel').classList.add('hidden'); _notifOpen = false; }
  else openNotifPanel();
});
document.getElementById('notif-panel').addEventListener('click', function(e){
  if (e.target === this) { this.classList.add('hidden'); _notifOpen = false; }
});

/* ---------- push notifications ---------- */
function urlB64ToUint8(base64String) {
  var padding = '='.repeat((4 - base64String.length % 4) % 4);
  var base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  var raw = window.atob(base64);
  var arr = new Uint8Array(raw.length);
  for (var i = 0; i < raw.length; ++i) arr[i] = raw.charCodeAt(i);
  return arr;
}
async function pushStatus(){
  if (!('serviceWorker' in navigator) || !('PushManager' in window)) return 'unsupported';
  if (Notification.permission === 'denied') return 'denied';
  try {
    var reg = await navigator.serviceWorker.getRegistration();
    if (!reg) return 'off';
    var sub = await reg.pushManager.getSubscription();
    return sub ? 'on' : 'off';
  } catch(e){ return 'off'; }
}
async function enablePush(){
  var reg = await navigator.serviceWorker.register('sw.js');
  await navigator.serviceWorker.ready;
  var perm = await Notification.requestPermission();
  if (perm !== 'granted') throw new Error('Permission not granted');
  var vk = await fetch(BACKEND + '/vapid-public-key').then(function(r){ return r.json(); });
  var sub = await reg.pushManager.subscribe({ userVisibleOnly: true, applicationServerKey: urlB64ToUint8(vk.publicKey) });
  var r = await fetch(BACKEND + '/employee/push/subscribe', {
    method: 'POST', headers: { 'Content-Type':'application/json', Authorization: 'Bearer ' + getToken() },
    body: JSON.stringify({ subscription: sub })
  });
  var d = await r.json();
  if (!d.success) throw new Error(d.error || 'Subscribe failed');
}
